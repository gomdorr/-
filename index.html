<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>곰돌이</title>
  <style>
    :root { color-scheme: light; }
    body{
      margin:0; height:100vh; display:grid; place-items:center;
      background: linear-gradient(135deg, #fff7f0, #f0fbff);
      font-family: system-ui, -apple-system, "Noto Sans KR", sans-serif;
      overflow:hidden;
    }
    .sparkle{
      position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,200,120,.35), transparent 35%),
        radial-gradient(circle at 75% 25%, rgba(120,210,255,.35), transparent 35%),
        radial-gradient(circle at 55% 80%, rgba(170,120,255,.25), transparent 40%);
      animation: float 6s infinite ease-in-out;
      opacity:.9;
    }
    @keyframes float{
      0%{ transform: translate3d(0,0,0) scale(1); }
      50%{ transform: translate3d(0,-10px,0) scale(1.02); }
      100%{ transform: translate3d(0,0,0) scale(1); }
    }

    .card{
      text-align:center;
      padding:28px 22px;
      border-radius:22px;
      background: rgba(255,255,255,.7);
      backdrop-filter: blur(8px);
      box-shadow: 0 14px 40px rgba(0,0,0,.10);
      border: 1px solid rgba(255,255,255,.6);
      min-width: 280px;
      max-width: min(520px, calc(100vw - 32px));
      position: relative;
    }

    /* 곰 + 깃발 */
    .bearWrap{
      position: relative;
      display:inline-block;
      transform-origin: 50% 80%;
      animation: dance 900ms infinite ease-in-out;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.10));
      user-select:none;
      will-change: transform;
      transition: transform 260ms ease;
    }
    .bear{
      font-size: 120px;
      line-height: 1;
      display:block;
      transition: transform 260ms ease, filter 260ms ease;
    }

    /* 기본 춤 */
    @keyframes dance{
      0%   { transform: translateY(0) rotate(-10deg) scale(1.0); }
      15%  { transform: translateY(-10px) rotate(8deg)  scale(1.03); }
      35%  { transform: translateY(0) rotate(-12deg) scale(1.0); }
      55%  { transform: translateY(-12px) rotate(10deg) scale(1.04); }
      75%  { transform: translateY(0) rotate(-8deg)  scale(1.0); }
      100% { transform: translateY(0) rotate(-10deg) scale(1.0); }
    }

    /* 승진: 더 거대해짐 */
    .promoted .bear{
      transform: scale(1.28);
    }

    /* 깃발 */
    .flag{
      position:absolute;
      left: 78%;
      top: 6%;
      transform: rotate(12deg);
      transform-origin: 0% 50%;
      pointer-events:none;
    }
    .pole{
      position:absolute;
      left: -8px;
      top: 6px;
      width: 5px;
      height: 78px;
      border-radius: 999px;
      background: rgba(30,30,30,.85);
      box-shadow: 0 6px 10px rgba(0,0,0,.12);
    }
    .cloth{
      position:relative;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(17,17,17,.92);
      color:#fff;
      font-weight:800;
      font-size: 14px;
      letter-spacing: .5px;
      white-space: nowrap;
      box-shadow: 0 10px 18px rgba(0,0,0,.14);
      transform-origin: 0% 50%;
      animation: wave 600ms infinite ease-in-out;
    }
    .cloth::before{
      content:"";
      position:absolute;
      left:-10px; top: 50%;
      transform: translateY(-50%);
      border-width: 10px 10px 10px 0;
      border-style: solid;
      border-color: transparent rgba(17,17,17,.92) transparent transparent;
    }
    @keyframes wave{
      0%   { transform: skewX(0deg) rotate(0deg); }
      50%  { transform: skewX(-8deg) rotate(-2deg); }
      100% { transform: skewX(0deg) rotate(0deg); }
    }

    /* 축출: 깃발 사라지고 울음 + 흉악화 */
    .banished .flag{ display:none; }
    .banished .bear::after{
      content:"";
    }
    .banished .bear{
      /* '아이콘은 그대로' 조건이라 이모지는 유지, 대신 느낌만 바꿈 */
      filter: drop-shadow(0 16px 18px rgba(0,0,0,.18));
    }
    .cry{
      margin-top: 10px;
      font-size: 28px;
      line-height: 1;
      height: 32px;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity 180ms ease, transform 180ms ease;
      user-select:none;
    }
    .banished .cry{
      opacity: 1;
      transform: translateY(0);
    }

    /* 갑자기 흉악한 곰돌이: 떨림 + 색조 변화(이모지 자체는 유지) */
    .feral .bearWrap{
      animation: feralShake 120ms infinite linear;
    }
    @keyframes feralShake{
      0% { transform: translate(0,0) rotate(-2deg); }
      25%{ transform: translate(2px,-1px) rotate(2deg); }
      50%{ transform: translate(-2px,1px) rotate(-2deg); }
      75%{ transform: translate(1px,2px) rotate(2deg); }
      100%{ transform: translate(0,0) rotate(-2deg); }
    }
    .feral .bear{
      filter: contrast(1.2) saturate(1.4) drop-shadow(0 18px 22px rgba(0,0,0,.22));
    }
    .flash{
      position:absolute; inset:-40px;
      background: radial-gradient(circle at 50% 50%, rgba(255,60,60,.22), transparent 55%);
      opacity: 0;
      pointer-events:none;
      transition: opacity 120ms ease;
      border-radius: 999px;
      filter: blur(2px);
    }
    .feral .flash{ opacity: 1; }

    .buttons{
      margin-top: 16px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    button{
      border:0;
      padding:10px 14px;
      border-radius:999px;
      background:#111;
      color:#fff;
      font-weight:800;
      cursor:pointer;
      touch-action: manipulation;
    }
    button:active{ transform: scale(.98); }
    button:focus-visible{
      outline: 3px solid rgba(0,0,0,.25);
      outline-offset: 3px;
    }
    .danger{ background:#b00020; }

    @media (prefers-reduced-motion: reduce){
      .sparkle, .bearWrap, .cloth{ animation: none !important; }
      .feral .bearWrap{ animation: none !important; }
    }
  </style>
</head>
<body>
  <div class="sparkle" aria-hidden="true"></div>

  <div class="card" role="main" aria-label="곰돌이 화면">
    <div class="flash" aria-hidden="true"></div>

    <div class="bearWrap" id="bearWrap" role="img" aria-label="총무팀 곰돌이">
      <span class="bear" id="bear" aria-hidden="true">🧸</span>

      <span class="flag" id="flag" aria-hidden="true">
        <span class="pole"></span>
        <span class="cloth">총무팀</span>
      </span>
    </div>

    <div class="cry" id="cry" aria-hidden="true">😭</div>

    <div class="buttons">
      <button id="btnPromote" type="button">곰돌이 승진</button>
      <button id="btnBanish" type="button" class="danger">곰돌이 축출</button>
    </div>
  </div>

  <script>
    const card = document.querySelector('.card');
    const wrap = document.getElementById('bearWrap');
    const bear = document.getElementById('bear');
    const cry = document.getElementById('cry');

    const btnPromote = document.getElementById('btnPromote');
    const btnBanish = document.getElementById('btnBanish');

    let promoted = false;
    let banished = false;
    let feralTimer = null;

    const clearFeral = () => {
      if (feralTimer) {
        clearTimeout(feralTimer);
        feralTimer = null;
      }
      card.classList.remove('feral');
    };

    btnPromote.addEventListener('click', () => {
      // 축출 상태면 승진 안 되게(원하면 이 줄 삭제)
      if (banished) return;

      promoted = !promoted;
      card.classList.toggle('promoted', promoted);

      // 울음 제거
      card.classList.remove('banished');
      cry.textContent = '😭';
      cry.setAttribute('aria-hidden', 'true');
    });

    btnBanish.addEventListener('click', () => {
      banished = true;
      promoted = false;
      card.classList.remove('promoted');

      // 깃발 제거 + 울음
      card.classList.add('banished');
      cry.textContent = '😭';
      cry.setAttribute('aria-hidden', 'true');

      // "갑자기" 흉악화: 짧게 텀 주고 변신
      clearFeral();
      feralTimer = setTimeout(() => {
        card.classList.add('feral');
        // 울음도 흉악한 느낌으로 바꾸고 싶으면 아래처럼
        cry.textContent = '😈';
      }, 700);
    });

    // 더블클릭/길게누름 같은 의도치 않은 텍스트 선택 방지(모바일)
    wrap.addEventListener('dragstart', (e) => e.preventDefault());
  </script>
</body>
</html>
