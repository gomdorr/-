<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>총무팀 곰돌이</title>
  <style>
    :root { color-scheme: light; }
    body{
      margin:0; height:100vh; display:grid; place-items:center;
      background: linear-gradient(135deg, #fff7f0, #f0fbff);
      font-family: system-ui, -apple-system, "Noto Sans KR", sans-serif;
      overflow:hidden;
    }
    .sparkle{
      position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(circle at 20% 30%, rgba(255,200,120,.35), transparent 35%),
        radial-gradient(circle at 75% 25%, rgba(120,210,255,.35), transparent 35%),
        radial-gradient(circle at 55% 80%, rgba(170,120,255,.25), transparent 40%);
      animation: float 7s infinite ease-in-out;
      opacity:.9;
    }
    @keyframes float{
      0%{ transform: translate3d(0,0,0) scale(1); }
      50%{ transform: translate3d(0,-10px,0) scale(1.02); }
      100%{ transform: translate3d(0,0,0) scale(1); }
    }

    .card{
      text-align:center;
      padding:22px 18px 18px;
      border-radius:22px;
      background: rgba(255,255,255,.75);
      backdrop-filter: blur(10px);
      box-shadow: 0 14px 40px rgba(0,0,0,.10);
      border: 1px solid rgba(255,255,255,.65);
      min-width: 300px;
      max-width: min(520px, calc(100vw - 32px));
      position: relative;
    }

    .stage{
      position: relative;
      display:inline-block;
      padding: 10px 18px 2px;
      border-radius: 18px;
    }

    /* 곰(이모지 유지) */
    .bearWrap{
      position: relative;
      display:inline-block;
      transform-origin: 50% 80%;
      filter: drop-shadow(0 10px 12px rgba(0,0,0,.10));
      user-select:none;
      will-change: transform;
      transition: transform 220ms ease;
    }
    .bear{
      font-size: 120px;
      line-height: 1;
      display:block;
      transition: transform 220ms ease, filter 220ms ease;
      will-change: transform;
    }

    /* 깃발 */
    .flag{
      position:absolute;
      left: 78%;
      top: 6%;
      transform: rotate(12deg);
      transform-origin: 0% 50%;
      pointer-events:none;
    }
    .pole{
      position:absolute;
      left: -8px;
      top: 6px;
      width: 5px;
      height: 78px;
      border-radius: 999px;
      background: rgba(30,30,30,.85);
      box-shadow: 0 6px 10px rgba(0,0,0,.12);
    }
    .cloth{
      position:relative;
      padding: 8px 12px;
      border-radius: 10px;
      background: rgba(17,17,17,.92);
      color:#fff;
      font-weight:900;
      font-size: 14px;
      letter-spacing: .5px;
      white-space: nowrap;
      box-shadow: 0 10px 18px rgba(0,0,0,.14);
      transform-origin: 0% 50%;
      animation: wave 700ms infinite ease-in-out;
      will-change: transform;
    }
    .cloth::before{
      content:"";
      position:absolute;
      left:-10px; top: 50%;
      transform: translateY(-50%);
      border-width: 10px 10px 10px 0;
      border-style: solid;
      border-color: transparent rgba(17,17,17,.92) transparent transparent;
    }
    @keyframes wave{
      0%   { transform: skewX(0deg) rotate(0deg); }
      50%  { transform: skewX(-8deg) rotate(-2deg); }
      100% { transform: skewX(0deg) rotate(0deg); }
    }

    /* 얼굴/상태 표정(곰 이모지는 그대로, 위에 표정 뱃지로 표현) */
    .mood{
      margin-top: 10px;
      height: 34px;
      font-size: 30px;
      line-height: 1;
      user-select:none;
      opacity: .95;
      transition: transform 160ms ease, opacity 160ms ease;
    }
    .mood.pop{
      transform: translateY(-3px) scale(1.06);
    }

    /* 버튼 */
    .buttons{
      margin-top: 14px;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }
    button{
      border:0;
      padding:10px 14px;
      border-radius:999px;
      background:#111;
      color:#fff;
      font-weight:900;
      cursor:pointer;
      touch-action: manipulation;
    }
    button:active{ transform: scale(.98); }
    button:focus-visible{
      outline: 3px solid rgba(0,0,0,.25);
      outline-offset: 3px;
    }
    .warn{ background:#b00020; }
    .reset{ background:#2a2a2a; }

    /* 탈주 연출 */
    .escape{
      animation: escape 900ms forwards ease-in;
    }
    @keyframes escape{
      0%   { transform: translate(0,0) rotate(0deg) scale(0.55); opacity:1; }
      60%  { transform: translate(140px,-40px) rotate(18deg) scale(0.45); opacity:.9; }
      100% { transform: translate(320px,-120px) rotate(28deg) scale(0.35); opacity:0; }
    }

    /* 하트 연출 */
    .heartBurst{
      position:absolute;
      inset: -10px -10px -10px -10px;
      pointer-events:none;
      display:grid;
      place-items:center;
      opacity: 0;
      transform: scale(.98);
      transition: opacity 200ms ease, transform 200ms ease;
    }
    .heartBurst.show{
      opacity: 1;
      transform: scale(1);
    }
    .heartBurst span{
      font-size: 40px;
      filter: drop-shadow(0 10px 14px rgba(0,0,0,.10));
      animation: hearts 900ms infinite ease-in-out;
    }
    @keyframes hearts{
      0%{ transform: translateY(6px) scale(1); opacity:.95; }
      50%{ transform: translateY(-6px) scale(1.08); opacity:1; }
      100%{ transform: translateY(6px) scale(1); opacity:.95; }
    }

    @media (prefers-reduced-motion: reduce){
      .sparkle, .cloth, .escape, .heartBurst span{ animation: none !important; }
      .heartBurst{ transition: none !important; }
    }
  </style>
</head>
<body>
  <div class="sparkle" aria-hidden="true"></div>

  <div class="card" role="main" aria-label="총무팀 곰돌이 게임">
    <div class="stage">
      <div class="heartBurst" id="heartBurst" aria-hidden="true"><span>💖💖💖</span></div>

      <div class="bearWrap" id="bearWrap" role="img" aria-label="총무팀 깃발을 단 곰돌이">
        <span class="bear" id="bear" aria-hidden="true">🧸</span>
        <span class="flag" id="flag" aria-hidden="true">
          <span class="pole"></span>
          <span class="cloth">총무팀</span>
        </span>
      </div>

      <div class="mood" id="mood" aria-hidden="true">😐</div>
    </div>

    <div class="buttons">
      <button id="btnFeed" type="button">먹이주기</button>
      <button id="btnPunish" type="button" class="warn">벌주기</button>
      <button id="btnReset" type="button" class="reset">정색하기</button>
    </div>
  </div>

  <script>
    const bearWrap = document.getElementById('bearWrap');
    const mood = document.getElementById('mood');
    const heartBurst = document.getElementById('heartBurst');

    const btnFeed = document.getElementById('btnFeed');
    const btnPunish = document.getElementById('btnPunish');
    const btnReset = document.getElementById('btnReset');

    // 상태 값: -MAX ... 0 ... +MAX
    const MAX = 5;
    let score = 0;        // 먹이(+), 벌(-)
    let escaped = false;  // 최대 벌이면 탈주

    const clamp = (n, min, max) => Math.max(min, Math.min(max, n));

    const popMood = () => {
      mood.classList.add('pop');
      setTimeout(() => mood.classList.remove('pop'), 160);
    };

    const setMood = (s) => {
      // 최대치 처리
      if (escaped) {
        mood.textContent = '🏃‍♂️💨';
        return;
      }
      if (s >= MAX) {
        mood.textContent = '🥰';
        return;
      }
      if (s <= -MAX) {
        mood.textContent = '😢';
        return;
      }

      if (s >= 3) mood.textContent = '😄';
      else if (s >= 1) mood.textContent = '🙂';
      else if (s === 0) mood.textContent = '😐';
      else if (s <= -3) mood.textContent = '😞';
      else mood.textContent = '🙁';
    };

    const applyVisual = () => {
      // 탈주 상태면 더 이상 조정 없음(정색하기로만 복구)
      if (escaped) return;

      // 크기: score에 따라 0.65~1.45 정도
      const scale = 1 + (score * 0.09); // MAX=5면 1.45, -5면 0.55
      bearWrap.style.transform = `scale(${clamp(scale, 0.55, 1.45)})`;

      // 하트: 최대 먹이 시 표시
      heartBurst.classList.toggle('show', score >= MAX);

      setMood(score);
    };

    const doEscape = () => {
      escaped = true;
      heartBurst.classList.remove('show');
      mood.textContent = '🏃‍♂️💨';
      popMood();
      // 곰 탈주 애니메이션
      bearWrap.classList.add('escape');
    };

    const feed = () => {
      if (escaped) return;
      score = clamp(score + 1, -MAX, MAX);
      setMood(score);
      popMood();

      if (score >= MAX) {
        heartBurst.classList.add('show');
        mood.textContent = '💖';
      } else {
        mood.textContent = score >= 3 ? '😄' : '🙂';
      }
      applyVisual();
    };

    const punish = () => {
      if (escaped) return;
      score = clamp(score - 1, -MAX, MAX);
      setMood(score);
      popMood();

      if (score <= -MAX) {
        // 최대 벌: 탈주
        doEscape();
        return;
      }
      applyVisual();
    };

    const reset = () => {
      score = 0;
      escaped = false;
      heartBurst.classList.remove('show');

      bearWrap.classList.remove('escape');
      // 탈주 후 transform이 애니메이션으로 바뀌기 때문에 강제 리셋
      bearWrap.style.transform = 'scale(1)';

      mood.textContent = '😐';
      popMood();
    };

    btnFeed.addEventListener('click', feed);
    btnPunish.addEventListener('click', punish);
    btnReset.addEventListener('click', reset);

    // 초기 적용
    applyVisual();

    // 모바일에서 드래그로 텍스트 선택되는 것 방지
    bearWrap.addEventListener('dragstart', (e) => e.preventDefault());
  </script>
</body>
</html>
